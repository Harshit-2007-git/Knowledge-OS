version: "3.9"

services:
  # ── MySQL 8.0 ──────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: knowledgeos-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_change_me}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-knowledge_os_db}
      MYSQL_USER: ${MYSQL_USER:-knowledge_os}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change_me_in_production}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - knowledgeos

  # ── ChromaDB ───────────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: knowledgeos-chromadb
    restart: unless-stopped
    ports:
      - "${CHROMA_PORT:-8001}:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    networks:
      - knowledgeos

  # ── Backend (FastAPI) ──────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: knowledgeos-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_HOST: mysql
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
      - upload_data:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      chromadb:
        condition: service_started
    networks:
      - knowledgeos

  # ── Frontend (Next.js) ─────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: knowledgeos-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - knowledgeos

volumes:
  mysql_data:
  chroma_data:
  upload_data:

networks:
  knowledgeos:
    driver: bridge
